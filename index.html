<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>家庭教育素養鑑定系統</title>

<style>
body{font-family:"Microsoft JhengHei";background:#fafafa;margin:0;text-align:center}
.container{max-width:1000px;margin:auto;padding:20px}

.page{display:none}
.active{display:block}

.btn{padding:10px 20px;background:#2c3e50;color:#fff;border:none;margin:10px;cursor:pointer}

/* 大富翁地圖 */
.board{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin:20px 0;
}

.tile{
border:1px solid #ccc;
padding:20px;
background:#fff;
font-size:14px;
}

.active-tile{
border:3px solid red;
background:#ffecec;
}

/* 事件 */
.event{border:1px solid #ccc;padding:15px;margin-top:10px}
.log{height:120px;overflow:auto;border:1px solid #ccc;margin-top:10px;font-size:13px}

/* 愚人節動畫 */
#shooting-popup{
display:none;
position:fixed;
top:0;left:0;width:100%;height:100%;
background:black;
color:red;
font-size:40px;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
animation:shake 0.1s infinite;
}

@keyframes shake{
0%{transform:translate(2px,2px)}
50%{transform:translate(-2px,-2px)}
100%{transform:translate(2px,-2px)}
}

.flash-text{
animation:blink 0.2s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}
</style>

</head>

<body>

<!-- 崩壞動畫 -->

<div id="shooting-popup">
<div class="flash-text">⚠ 系統錯誤 ⚠</div>
<div class="flash-text">數據清除中...</div>
<div class="flash-text">人格分析失敗</div>
<div class="flash-text">ERROR 404 教檢不存在</div>
</div>

<div class="container">

<h1>2026家庭教育專業素養鑑定系統</h1>

<!-- 登入 -->

<div id="p-login" class="page active">
<input id="uname" placeholder="輸入名字"><br>
<button class="btn" onclick="start()">開始鑑定</button>
</div>

<!-- 遊戲 -->

<div id="p-game" class="page">

<div id="turn">回合 1 / 14</div>
<button class="btn" onclick="roll()">🎲 擲骰子</button>

<div class="board" id="board"></div>

<div id="event" class="event"></div>
<div id="choices"></div>

<div id="log" class="log"></div>
</div>

<!-- 狐狸 -->

<div id="p-comment" class="page">
<h2>最終審查</h2>
<p>你是否在雪山上救過狐狸？</p>

<button class="btn" onclick="saveComment('我是狐狸')">我是那隻狐狸</button> <button class="btn" onclick="saveComment('我是醬板鴨')">我不是狐狸，我是醬板鴨</button> <button class="btn" onclick="saveComment('我不知道')">我不知道</button>

</div>

<!-- 結局 -->

<div id="p-joke" class="page">
<h1>🤡 愚人節快樂 🤡</h1>
<div id="result"></div>
<button class="btn" onclick="location.reload()">重新開始</button>
</div>

</div>

<script>

// ===== 事件 =====
const tileMap = [
"家庭陪伴","加班抉擇","健康檢查","學校衝突",
"家庭活動","財務壓力","身心疲勞","親子衝突",
"教育選擇","市場波動","休息時間","社交壓力"
];

// ===== 狀態 =====
let p={day:1,pos:0,m:50,e:50,r:50}
let name=""
let finalComment=""

// ===== 初始化地圖 =====
function renderBoard(){
const board=document.getElementById('board')
board.innerHTML=''

tileMap.forEach((t,i)=>{
const d=document.createElement('div')
d.className='tile'
d.id='tile-'+i
d.innerText=t
board.appendChild(d)
})

updateBoard()
}

function updateBoard(){
document.querySelectorAll('.tile').forEach(t=>t.classList.remove('active-tile'))
const now=document.getElementById('tile-'+p.pos)
if(now) now.classList.add('active-tile')
}

// ===== 工具 =====
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
document.getElementById(id).classList.add('active')
}

function log(t){
const logDiv=document.getElementById('log')
logDiv.innerHTML=`<div>${t}</div>`+logDiv.innerHTML
}

// ===== 開始 =====
function start(){
name=document.getElementById('uname').value||"考生"
renderBoard()
show('p-game')
}

// ===== 骰子 =====
function roll(){
const dice=Math.floor(Math.random()*3)+1
p.pos=(p.pos+dice)%tileMap.length

updateBoard()
log(`🎲 ${name} 擲出 ${dice}`)
showEvent()
}

// ===== 事件 =====
function showEvent(){
const text=tileMap[p.pos]

document.getElementById('event').innerHTML=`<b>${text}</b><br>你面臨一個重要選擇`

const cDiv=document.getElementById('choices')
cDiv.innerHTML=''

const options=[
{n:"理性決策",m:5,e:-5,r:5},
{n:"情緒反應",m:0,e:-10,r:-10}
]

options.forEach(opt=>{
const b=document.createElement('button')
b.className="btn"
b.innerText=opt.n
b.onclick=()=>choose(opt)
cDiv.appendChild(b)
})
}

// ===== 選擇 =====
function choose(opt){
p.m+=opt.m
p.e+=opt.e
p.r+=opt.r

log(`變動 M${opt.m} E${opt.e} R${opt.r}`)

p.day++

document.getElementById('choices').innerHTML=''
document.getElementById('event').innerHTML='👉 請再擲骰子'

if(p.day>12){
show('p-comment')
}else{
document.getElementById('turn').innerText=`回合 ${p.day} / 14`
}
}

// ===== 狐狸 =====
function saveComment(c){
finalComment=c
playAnimation()
}

// ===== 動畫 =====
function playAnimation(){
const pop=document.getElementById('shooting-popup')
pop.style.display='flex'

setTimeout(()=>{
pop.style.display='none'

document.getElementById('result').innerHTML=`
💀 系統最終判定 💀<br><br>
${name}<br><br>
你的回答：${finalComment}<br><br>
👉 你太認真了<br>
這只是愚人節 🤡
`

show('p-joke')

},2500)
}

</script>

</body>
</html>
